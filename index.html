<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino World</title>
     <link rel="stylesheet" href="./css/style.css">
</head>
<body>

 <!-- START SCREEN -->
    <div id="start-screen" class="container">
      <img src="./img/logo-dino.png" width="500" alt="logo">
      <h1> Dino World</h1>
      <button id="start-btn">Start!</button>
    </div>
    
    <!-- GAME SCREEN -->
    <div id="game-screen" class="container">
      <div id="score">Score: 0</div>
      <div id="timer">Time: 3:00</div>
    
      <div id="game-box">
        <!-- Game elements will be added here via javascript and DOM manipulation -->
      </div>
      
    </div>
    
    <!-- GAME OVER SCREEN -->
    <div id="game-over-screen" class="container">
      <img src="./img/gameover.gif" width="500" alt="logo">
    </div>


   <!-- Score Result SCREEN -->
    <div id="score-result-screen" class="container">
      <img src="./img/celebration.gif" width="500" alt="logo">
    </div>    







    <script src="./JS/main.js"></script>
</body>
</html>
