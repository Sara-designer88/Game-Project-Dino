<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino World</title>
     <link rel="stylesheet" href="./css/style.css">
</head>
<body>

 <!-- START SCREEN -->
    <div id="start-screen" class="container">
      <img src="./img/logo-dino.png" width="500" alt="logo">
      <h1> Dino World</h1>
      <button id="start-btn">Start!</button>
    </div>
    
    <!-- GAME SCREEN -->
    <div id="game-screen" class="container">
      <div id="score">Score: 0</div>
      <div id="timer">Timer: 00:60 </div>
      <button id = "sound-btn">
      <img id ="sound-icon" src="./img/unmuteSound.png" width ="30" alt="sound">
    </button>

      <div id="game-box">
        <!-- Game elements will be added here via javascript and DOM manipulation -->
      </div>
      
    </div>
    
    <!-- GAME OVER SCREEN -->
    <div id="game-over-screen" class="container">
      <h1>Game Over</h1>
      <img src="./img/gameover.gif" width="500" alt="logo">
      <button id="restart-btn">Restart</button>
    </div>


   <!-- Score Result SCREEN -->
    <div id="score-result-screen" class="container">
      <img src="./img/celebration.gif" width="500" alt="logo">
       <h2 id="score-text"></h2>
      <button id="restart-btn2">Restart</button>
    </div>    







    <script src="./JS/main.js"></script>
     <script src="./JS/dino.js"></script>
      <script src="./JS/badTarget.js"></script>
       <script src="./JS/goodTarget.js"></script>
</body>
</html>
